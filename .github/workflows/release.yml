name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
            artifact_path: |
              dist/*.dmg
              dist/*.zip
              dist/*.yml
              dist/*.blockmap
          - os: windows-latest
            target: win
            artifact_path: |
              dist/*.exe
              dist/*.yml
              dist/*.blockmap
          - os: ubuntu-latest
            target: linux
            artifact_path: |
              dist/*.AppImage
              dist/*.yml
              dist/*.blockmap
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Platform evidence
        run: node -p "process.platform + '-' + process.arch"
      - run: npm ci
      # electron-builder needs the notarization key as a file, not the base64 secret directly.
      - name: Decode Apple API key
        if: matrix.target == 'mac'
        run: |
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/apple_api_key.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/apple_api_key.p8" >> "$GITHUB_ENV"
      # APPIMAGE_EXTRACT_AND_RUN lets electron-builder's bundled appimagetool
      # run without libfuse2 (absent on the runners); a no-op on mac/win.
      - run: npm run dist:${{ matrix.target }}
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
          CSC_LINK: ${{ matrix.target == 'mac' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.target == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY_ID: ${{ matrix.target == 'mac' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.target == 'mac' && secrets.APPLE_API_ISSUER || '' }}
      - name: Verify mac code signing and notarization
        if: matrix.target == 'mac'
        run: |
          set -euo pipefail
          app_path=$(find dist -maxdepth 2 -name '*.app' -print -quit)
          if [ -z "$app_path" ]; then
            echo "no .app bundle found under dist/" >&2
            exit 1
          fi
          dmg_path=$(find dist -maxdepth 1 -name '*.dmg' -print -quit)
          if [ -z "$dmg_path" ]; then
            echo "no .dmg installer found under dist/" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl -a -vvv --type execute "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-${{ matrix.target }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.zip
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.yml
            artifacts/*.blockmap
          body_path: .github/RELEASE_TEMPLATE.md
